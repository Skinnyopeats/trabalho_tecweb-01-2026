<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda — Adicionar</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <h1>Agenda</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/adicionar.html" aria-current="page">Adicionar</a>
        <a href="/consultar.html">Consultar</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Adicionar Item</h2>
        <form id="form-adicionar" novalidate>
          <label for="titulo">Título <span aria-hidden="true">*</span></label>
          <input type="text" id="titulo" name="titulo" required placeholder="Ex: Reunião de equipe" />

          <label for="data">Data <span aria-hidden="true">*</span></label>
          <input type="date" id="data" name="data" required />

          <label for="categoria">Categoria <span aria-hidden="true">*</span></label>
          <select id="categoria" name="categoria" required>
            <option value="">Selecione...</option>
            <option value="trabalho">Trabalho</option>
            <option value="pessoal">Pessoal</option>
            <option value="estudo">Estudo</option>
            <option value="saude">Saúde</option>
            <option value="outro">Outro</option>
          </select>

          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" rows="4" placeholder="Detalhes do item..."></textarea>

          <output id="mensagem" role="status"></output>

          <button type="submit">Salvar</button>
        </form>
      </section>
    </main>

    <script type="module" src="/src/adicionar.js"></script>
  </body>
</html>
